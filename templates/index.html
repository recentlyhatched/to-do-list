<!DOCTYPE html>
<html>
<head>
    <title>Hello Flask</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        .container {
            background: white;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
        }

        input, button, select {
            padding: 8px;
            margin-top: 10px;
        }

        li {
            margin: 6px 0;
        }

        .remove-underline {
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>To Do App</h1>

        <form method="POST">
            <input type="text" name="task" placeholder="Add a task" required>
            
            <input type="date" name="deadline">

            <select name="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <button type="submit">Add</button>
        </form>

        <h3>Filter</h3>

        <a href="/">All</a>
        <a href="/?priority=High">High</a>
        <a href="/?priority=Medium"> Medium</a>
        <a href="/?priority=Low">Low</a>

        <h3>Task</h3>

        <ul>
            {% for task in tasks %}
                <li>
                    {% if task[2] == 1 %}
                        <s>{{ task[1] }}</s>
                    {% else %}
                        {{ task[1] }}
                    {% endif %}

                    | Due: {{ task[3] if task[3] else "No deadline" }}
                    | Priority: {{ task[4] }}
                    
                    <a class="remove-underline" href="/complete/{{ task[0] }}">✔</a>
                    <a class="remove-underline" href="/edit/{{ task[0] }}">✏</a>
                    <a class="remove-underline" href="/delete/{{ task[0] }}">✖</a>
                </li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
