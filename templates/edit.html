<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }

        .container {
            background: white;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
        }

        input, button, select {
            padding: 8px;
            margin-top: 10px;
        }

        li {
            margin: 6px 0;
        }

        .remove-underline {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Edit Task</h1>
        <form method="POST">
            <label>Task</label>
            <input type="text" name="task" value="{{ task_text }}" required>

            <br>

            <label>Deadline</label>
            <input type="date" name="deadline" value="{{ deadline }}">

            <br>

            <label>Priority</label>
            <select name="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>

            <br>

            <button type="submit">Save</button>
            <a href="/">Cancel</a>
        </form>
    </div>
</body>
</html>
